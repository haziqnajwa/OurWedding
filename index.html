<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Wedding</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="locked">

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO SECTION -->
<section class="heroSection">
  <div class="stage">

    <!-- COVER -->
    <div class="coverWrap" id="coverWrap">
      <img src="cover.webp" alt="Cover">
      <button id="sealBtn"></button>
    </div>

    <!-- OPENING VIDEO -->
    <div class="openingWrap" id="openingWrap">
      <video id="openingVideo" class="openingVideo" playsinline preload="auto">
        <source src="opening.webm" type="video/webm">
      </video>
    </div>

    <!-- CARD SCENE -->
    <div class="cardScene" id="cardScene">
      <img src="card_bg.webp" class="cardBg" alt="Card Background">

      <div class="cardLayer" id="cardLayer">
        <div class="flip-container" id="flipContainer">
          <div class="flipper" id="flipper">
            <div class="front">
              <img src="card_front.webp" alt="Front">
            </div>
            <div class="back">
              <img src="card_back.webp" alt="Back">
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- CONTENT -->
<div class="content" id="content">

  <!-- RSVP -->
  <section class="imageSection">
    <div class="imgBlock">
      <img src="rsvp.webp" class="sectionImg">
      <div class="rsvpBtns">
        <a href="#" class="imgBtn">Google Map</a>
        <a href="#" class="imgBtn">RSVP Form</a>
      </div>
    </div>
  </section>

  <!-- COUNTDOWN -->
  <section class="imageSection">
    <div class="imgBlock">
      <img src="countdown.webp" class="sectionImg">
      <div class="countdownOverlay" id="countdown"></div>
    </div>
  </section>

  <!-- GALLERY -->
  <section class="imageSection">
    <div class="imgBlock">
      <img src="gallery.webp" class="sectionImg">
      <div class="galleryShell">
        <button class="galleryNav prev">&#10094;</button>
        <div class="galleryViewport">
          <div class="galleryTrack" id="galleryTrack">
            <div class="gallerySlide"><img src="gallery1.webp"></div>
            <div class="gallerySlide"><img src="gallery2.webp"></div>
            <div class="gallerySlide"><img src="gallery3.webp"></div>
            <div class="gallerySlide"><img src="gallery4.webp"></div>
          </div>
        </div>
        <button class="galleryNav next">&#10095;</button>
      </div>
    </div>
  </section>

  <!-- DOA -->
  <section class="doaSection">
    <div class="doaBlock">
      <img src="doa_bg.webp" class="doaBg">
      <div class="doaText">
        <div class="line">بارك الله لكما وبارك عليكما</div>
        <div class="line">وجمع بينكما في خير</div>
      </div>
    </div>
  </section>

</div>

<script>
const sealBtn = document.getElementById("sealBtn");
const coverWrap = document.getElementById("coverWrap");
const openingWrap = document.getElementById("openingWrap");
const openingVideo = document.getElementById("openingVideo");
const cardScene = document.getElementById("cardScene");
const cardLayer = document.getElementById("cardLayer");
const bgMusic = document.getElementById("bgMusic");
const content = document.getElementById("content");
const flipper = document.getElementById("flipper");

sealBtn.onclick = async () => {
  document.body.classList.remove("locked");
  coverWrap.style.display = "none";
  openingWrap.classList.add("show");
  await bgMusic.play().catch(()=>{});
  openingVideo.play();
};

openingVideo.onended = () => {
  openingWrap.classList.remove("show");
  cardScene.style.display = "block";
  cardLayer.classList.add("show");
  content.style.display = "block";
};

document.getElementById("flipContainer").onclick = () => {
  flipper.classList.toggle("flip");
};
</script>

</body>
</html>
